<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login — JKA Indonesia</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="../assets/images/favicon.png" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="login-wrap">
  <form class="login-card" id="loginForm">
    <div class="brand"><img src="../assets/images/logo.png" alt="JKA Indonesia"></div>
    <div class="tag">Members Admin Dashboard</div>
    <h1>Sign in</h1>
    <div class="msg error hidden" id="err"></div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="username" required placeholder="you@jkaindonesia.or.id">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" required placeholder="••••••••">
    </div>
    <button class="btn block" type="submit" id="submitBtn">Sign in</button>
  </form>
</div>
<script>
const form = document.getElementById('loginForm');
const err = document.getElementById('err');
const btn = document.getElementById('submitBtn');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.classList.add('hidden');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const r = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: document.getElementById('email').value.trim(), password: document.getElementById('password').value })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Login failed');
    location.href = '/admin/';
  } catch (e2) {
    err.textContent = e2.message; err.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Sign in';
  }
});
</script>
</body>
</html>
